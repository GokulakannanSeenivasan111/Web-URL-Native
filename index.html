<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 3D - Multi Stream (Optimized)</title>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(18,18,18,0.6);
            --glass-border: rgba(255,255,255,0.08);
            --accent: #ffffff;
            --accent-dim: rgba(255,255,255,0.5);
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body,html { width:100%; height:100%;
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
            background:#0a0a0a; color:var(--accent); overflow:hidden;
            -webkit-font-smoothing:antialiased; }

        #viewer-container { width:100%; height:100%; position:relative;
            display:flex; justify-content:center; align-items:center; }

        model-viewer { width:100%; height:100%; opacity:0; transition:opacity 0.6s ease; }

        /* Top Bar Status Monitor */
        .top-nav { position:absolute; top:20px; left:20px; right:20px;
            display:flex; justify-content:space-between; align-items:center;
            z-index:10; pointer-events:none; }
        .nav-pill { background:var(--glass-bg);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);
            padding:8px 16px; border-radius:20px;
            pointer-events:auto; display:flex; gap:12px; align-items:center;
            font-size:12px; letter-spacing:-0.2px; }
        .status-dot { width:6px; height:6px; background:#ff9500; border-radius:50%; transition:background 0.3s; }
        .status-dot.ready { background:#30d158; }
        .status-dot.error { background:#ff3b30; }

        /* Responsive Bottom Toolbar Control Layout */
        .bottom-toolbar { position:absolute; bottom:24px;
            left:50%; transform:translateX(-50%);
            background:var(--glass-bg);
            backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
            border:1px solid var(--glass-border);
            padding:6px; border-radius:30px;
            display:flex; gap:4px; align-items:center;
            z-index:10; max-width:95%; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .control-tab { display:flex; align-items:center;
            padding:8px 14px; border-radius:20px;
            font-size:12px; font-weight:500; color:var(--accent-dim);
            cursor:pointer; user-select:none; transition:all 0.2s ease;
            gap:6px; white-space:nowrap; }
        .control-tab:hover { color:var(--accent); }
        .control-tab.active { background:rgba(255,255,255,0.1); color:var(--accent); }
        select.control-select { background:transparent; border:none; color:var(--accent);
            font-size:12px; font-weight:500; outline:none; cursor:pointer; }
        select.control-select option { background:#1a1a1a; color:#fff; }
        .divider { width:1px; height:16px; background:rgba(255,255,255,0.15); margin:0 4px; }

        /* AR Trigger Control Placement */
        #ar-trigger { background:var(--accent); color:#000;
            font-weight:600; padding:10px 20px; border-radius:24px;
            border:none; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
        #ar-trigger:hover { background:rgba(255,255,255,0.9); }
        model-viewer > #ar-trigger { position:absolute; bottom:85px; left:50%;
            transform:translateX(-50%); z-index:100; }

        /* Dynamic System Loader Backdrop */
        #loader-overlay { position:absolute; inset:0;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center; gap:20px;
            z-index:20; pointer-events:none; transition:opacity 0.5s ease; background:#0a0a0a;}
        #loading-text { font-size:13px; font-weight:400; color:var(--accent-dim); letter-spacing:0.2px; text-align:center; padding:0 20px;}

        /* Scalable Multi-Track Progress Monitors */
        .bar-group { display:flex; flex-direction:column; gap:10px; width:260px; max-height: 50vh; overflow-y: auto; padding: 4px; }
        .bar-group::-webkit-scrollbar { width: 4px; }
        .bar-group::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bar-row { display:flex; flex-direction:column; gap:4px; }
        .bar-label { font-size:10px; color:rgba(255,255,255,0.35); letter-spacing:0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { width:100%; height:2px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
        .bar-fill { height:100%; width:0%; background:var(--accent); border-radius:2px; transition:width 0.2s ease; }

        #speed-label { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:0.3px; margin-top: 4px; }
    </style>
</head>
<body>
<div id="viewer-container">

    <div id="loader-overlay">
        <div id="loading-text">Connecting to Live Asset Streams…</div>
        <div class="bar-group" id="dynamic-bar-container"></div>
        <div id="speed-label"></div>
    </div>

    <model-viewer id="viewer"
        camera-controls touch-action="pan-y"
        shadow-intensity="0.4" shadow-softness="0.8" exposure="0.9" environment-image="neutral"
        interpolation-decay="200"
        ar ar-modes="webxr"
        ar-scale="auto" ar-placement="floor">
        <button slot="ar-button" id="ar-trigger">▲ View in Space</button>
    </model-viewer>

    <div class="top-nav">
        <div class="nav-pill">
            <div id="status-light" class="status-dot"></div>
            <span id="status-label">Connecting…</span>
        </div>
    </div>

    <div class="bottom-toolbar">
        <div id="tab-turntable" class="control-tab"><span>⟳</span> Turntable</div>
        <div id="tab-shadow"    class="control-tab active"><span>☖</span> Shadows</div>
        <div id="dock-animations" style="display:none; align-items:center; gap:4px;">
            <div class="divider"></div>
            <div id="tab-play" class="control-tab active"><span>▻</span> Play</div>
            <div class="control-tab">
                <select id="clip-picker" class="control-select"></select>
            </div>
        </div>
        <div class="divider"></div>
        <div id="tab-ar-placement" class="control-tab"><span>⚲</span> Floor</div>
        <div id="tab-ar-scale"    class="control-tab"><span>⤢</span> Scalable</div>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// ── Configuration Array ──────────────────────────────────────────────────────
const GLB_URLS = [
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/Screed.glb',        name: 'Screed.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/ScreedRH.glb',       name: 'ScreedRH.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/ScreedLH.glb',       name: 'ScreedLH.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/Auger.glb',          name: 'Auger.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/Seat&Cabin.glb',     name: 'Seat&Cabin.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/Tracktor C.glb',     name: 'Tracktor.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/TowArm.glb',          name: 'TowArm.glb' },
    { url: 'https://raw.githubusercontent.com/GokulakannanSeenivasan111/Test-Web-AR-GLB-Viewer/main/HopperSimulated.glb', name: 'HopperSimulated.glb' }
];

// ── DOM Elements ─────────────────────────────────────────────────────────────
const viewer         = document.getElementById('viewer');
const arTrigger      = document.getElementById('ar-trigger');
const loaderOverlay  = document.getElementById('loader-overlay');
const loadingText    = document.getElementById('loading-text');
const speedLabel     = document.getElementById('speed-label');
const statusLight    = document.getElementById('status-light');
const statusLabel    = document.getElementById('status-label');
const tabTurntable   = document.getElementById('tab-turntable');
const tabShadow      = document.getElementById('tab-shadow');
const dockAnims      = document.getElementById('dock-animations');
const tabPlay        = document.getElementById('tab-play');
const clipPicker     = document.getElementById('clip-picker');
const tabArPlacement = document.getElementById('tab-ar-placement');
const tabArScale     = document.getElementById('tab-ar-scale');
const barContainer   = document.getElementById('dynamic-bar-container');

// Tracking variables
const barFills  = [];
const barLabels = [];
let targetScaleString = '1 1 1';
let requiresRescaling = false;

// ── Utilities ────────────────────────────────────────────────────────────────
const fmtBytes = b => b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(2)+'MB';
const fmtSpeed = b => b < 1024 ? b.toFixed(0)+'B/s' : b < 1048576 ? (b/1024).toFixed(1)+'KB/s' : (b/1048576).toFixed(2)+'MB/s';

function hideLoader() {
    loaderOverlay.style.opacity = '0';
    setTimeout(() => { loaderOverlay.style.display = 'none'; }, 500);
}

function compileDynamicProgressBarLayout() {
    barContainer.innerHTML = '';
    GLB_URLS.forEach((asset, idx) => {
        const row = document.createElement('div');
        row.className = 'bar-row';
        const label = document.createElement('div');
        label.className = 'bar-label';
        label.textContent = asset.name;
        const track = document.createElement('div');
        track.className = 'bar-track';
        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        if (idx > 0) fill.style.background = 'rgba(255,255,255,0.6)';
        track.appendChild(fill);
        row.appendChild(label);
        row.appendChild(track);
        barContainer.appendChild(row);
        barFills.push(fill);
        barLabels.push(label);
    });
}

async function fetchGLB(url, barIdx) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP Error ${res.status} targeting asset ${url}`);
    const contentLength = parseInt(res.headers.get('content-length') || '0', 10);
    const hasLen = contentLength > 0;
    const reader = res.body.getReader();
    const chunks = [];
    let received = 0, lastTime = performance.now(), lastBytes = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.byteLength;
        const now = performance.now();
        const elapsed = (now - lastTime) / 1000;
        if (elapsed >= 0.25) {
            const bps = (received - lastBytes) / elapsed;
            lastTime = now; lastBytes = received;
            const pct = hasLen ? (received / contentLength * 100) : Math.min(95, received / 1048576 * 10);
            if (barFills[barIdx]) barFills[barIdx].style.width = Math.min(100, pct) + '%';
            if (barLabels[barIdx]) {
                barLabels[barIdx].textContent = GLB_URLS[barIdx].name + ' — ' + fmtBytes(received) + (hasLen ? ' / '+fmtBytes(contentLength) : '');
            }
            speedLabel.textContent = fmtSpeed(bps);
        }
    }
    if (barFills[barIdx]) barFills[barIdx].style.width = '100%';
    if (barLabels[barIdx]) barLabels[barIdx].textContent = GLB_URLS[barIdx].name + ' ✓';

    const total = new Uint8Array(received);
    let offset = 0;
    for (const c of chunks) { total.set(c, offset); offset += c.byteLength; }
    return total.buffer;
}

// MEMORY MANAGEMENT FIX: Deep purge capability that forces immediate VRAM evacuation
function purgeThreeGarbage(scene) {
    scene.traverse(node => {
        if (node.isMesh) {
            if (node.geometry) node.geometry.dispose();
            if (node.material) {
                if (Array.isArray(node.material)) {
                    node.material.forEach(mat => {
                        if (mat.map) mat.map.dispose();
                        mat.dispose();
                    });
                } else {
                    if (node.material.map) node.material.map.dispose();
                    node.material.dispose();
                }
            }
        }
    });
    THREE.Cache.clear();
}

// ── Unified Processing Loop ──────────────────────────────────────────────────
async function initRemoteStream() {
    // Scaffold structural containers cleanly
    const masterScene = new THREE.Scene();
    const allAnimations = [];

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    try {
        compileDynamicProgressBarLayout();
        statusLabel.textContent = 'Connecting…';

        // Stream and parse layout sequentially to clear memory spikes immediately
        for (let i = 0; i < GLB_URLS.length; i++) {
            const asset = GLB_URLS[i];
            loadingText.textContent = `Streaming asset ${i+1}/${GLB_URLS.length}: ${asset.name}…`;
            statusLabel.textContent = `Streaming part ${i+1}…`;

            // 1. Fetch binary block array
            let buffer = await fetchGLB(asset.url, i);
            speedLabel.textContent  = '';

            // 2. Parse structural arrays safely
            const gltf = await new Promise((resolve, reject) => {
                loader.parse(buffer, '', resolve, reject);
            });
            
            // 3. WIPE binary chunk reference instantly to prevent dual allocation RAM bottlenecks
            buffer = null; 

            if (gltf.scene) {
                gltf.scene.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        
                        // PERFORMANCE FIX: Prevent CPU matrix thrashing on static parts
                        node.matrixAutoUpdate = false;
                        node.updateMatrix();
                        
                        // MOBILE PERFORMANCE FIX: Reduce floating-point precision footprints on the fly
                        if (node.material) {
                            node.material.precision = 'mediump';
                            if (node.material.map) {
                                node.material.map.minFilter = THREE.LinearFilter;
                            }
                        }
                    }
                });
                masterScene.add(gltf.scene);
            }

            if (gltf.animations && gltf.animations.length > 0) {
                const baseIdentity = asset.name.replace('.glb', '');
                gltf.animations.forEach(clip => {
                    clip.name = clip.name ? `${clip.name} (${baseIdentity})` : `Anim (${baseIdentity})`;
                    allAnimations.push(clip);
                });
            }
        }

        loadingText.textContent = 'Compiling unified matrix asset layers…';
        statusLabel.textContent = 'Assembling output…';

        // Clear heavy Draco decompression buffers entirely before launching exporter
        dracoLoader.dispose();
        loader.setDRACOLoader(null);

        const exporter = new GLTFExporter();
        exporter.parse(
            masterScene,
            function (gltfBuffer) {
                // MEMORY REVOLUTION FIX: Clean up and delete Three.js architecture objects 
                // BEFORE letting model-viewer execute its internal engine parsing sequence.
                purgeThreeGarbage(masterScene);

                const blob = new Blob([gltfBuffer], { type: 'model/gltf-binary' });
                
                // Track and clean old system Blobs to prevent browser cache leaks on reload
                if (viewer.src && viewer.src.startsWith('blob:')) {
                    URL.revokeObjectURL(viewer.src);
                }
                
                viewer.src = URL.createObjectURL(blob);
                
                hideLoader();
                viewer.style.opacity = '1';
                statusLight.className = 'status-dot ready';
                statusLabel.textContent = 'Engine Online';
            },
            function (err) {
                throw new Error("GLTF export compilation failed: " + err.message);
            },
            { binary: true, animations: allAnimations }
        );

    } catch (err) {
        statusLight.className = 'status-dot error';
        statusLabel.textContent = 'Sync Interrupted';
        loadingText.textContent = `Exception context execution error: ${err.message}`;
        console.error(err);
    }
}

// ── Native Model Viewer Event Handling Lifecycle ─────────────────────────────
viewer.addEventListener('load', () => {
    const nativeClips = viewer.availableAnimations || [];
    clipPicker.innerHTML = '';
    
    if (nativeClips.length > 0) {
        nativeClips.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            clipPicker.appendChild(opt);
        });
        dockAnims.style.display = 'flex';
        viewer.animationName = nativeClips[0];
        viewer.play();
        tabPlay.classList.add('active');
        tabPlay.innerHTML = '<span>▻</span> Play';
    }

    requestAnimationFrame(() => {
        const dim = viewer.getDimensions();
        const max = Math.max(dim.x, dim.y, dim.z);
        const target = 0.75;
        if (max > 0 && max > target) {
            const s = target / max;
            targetScaleString = `${s} ${s} ${s}`;
            requiresRescaling = true;
        }
    });
});

viewer.addEventListener('error', err => {
    statusLight.className = 'status-dot error';
    statusLabel.textContent = 'Load Error';
    loadingText.textContent = 'Graphics context hardware allocation failed.';
    console.error(err);
});

// ── Interactive Layout UI Control Bindings ───────────────────────────────────
arTrigger.addEventListener('click', () => {
    if (requiresRescaling) viewer.setAttribute('scale', targetScaleString);
});

viewer.addEventListener('ar-status', e => {
    if (e.detail.status === 'not-presenting') {
        viewer.removeAttribute('scale');
        if (typeof viewer.updateFraming === 'function') viewer.updateFraming();
        else viewer.cameraOrbit = 'auto auto auto';
    }
});

tabTurntable.addEventListener('click', () => {
    if (tabTurntable.classList.toggle('active')) {
        viewer.setAttribute('auto-rotate', '');
        viewer.setAttribute('rotation-per-second', '24deg');
    } else { viewer.removeAttribute('auto-rotate'); }
});

tabShadow.addEventListener('click', () => {
    viewer.setAttribute('shadow-intensity', tabShadow.classList.toggle('active') ? '0.4' : '0');
});

tabPlay.addEventListener('click', () => {
    if (!viewer.paused) {
        viewer.pause();
        tabPlay.classList.remove('active');
        tabPlay.innerHTML = '<span>⏸</span> Paused';
    } else {
        viewer.play();
        tabPlay.classList.add('active');
        tabPlay.innerHTML = '<span>▻</span> Play';
    }
});

clipPicker.addEventListener('change', e => {
    viewer.animationName = e.target.value;
    viewer.play();
    tabPlay.classList.add('active');
    tabPlay.innerHTML = '<span>▻</span> Play';
});

tabArPlacement.addEventListener('click', () => {
    if (viewer.getAttribute('ar-placement') === 'floor') {
        viewer.setAttribute('ar-placement', 'wall');
        tabArPlacement.innerHTML = '<span>↕</span> Wall Mount';
        tabArPlacement.classList.add('active');
    } else {
        viewer.setAttribute('ar-placement', 'floor');
        tabArPlacement.innerHTML = '<span>⚲</span> Floor';
        tabArPlacement.classList.remove('active');
    }
});

tabArScale.addEventListener('click', () => {
    if (viewer.getAttribute('ar-scale') === 'auto') {
        viewer.setAttribute('ar-scale', 'fixed');
        tabArScale.innerHTML = '<span>🔒</span> Fixed 1:1';
        tabArScale.classList.add('active');
    } else {
        viewer.setAttribute('ar-scale', 'auto');
        tabArScale.innerHTML = '<span>⤢</span> Scalable';
        tabArScale.classList.remove('active');
    }
});

initRemoteStream();
</script>
</body>
</html>
